<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Facts & Pics</title>
    <link rel="icon" type="image/x-icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSkBl0xpVBC68KM3OY9RcadOWKHP_7cm697OQ&s">
    <link rel="stylesheet" href="mystyle.css">
</head>
<body>
    <div class="whole">
        <div class="main">
            <div style="display: flex; flex-direction: row; gap: 20px;">
                <div class="titlebox">
                    <div class="sidebar1"></div>
                    <div class="sidebar"></div>
                    <div class="title">
                        Animal Scroll
                    </div>
                    <div class="sidebar"></div>
                    <div class="sidebar1"></div>
                </div>
            </div>
            <div style="display: flex; flex-direction: row; gap: 10px; justify-content: space-evenly;">
                <div>
                    <button class="button" onclick="fetchDogData()">
                    <span class="shadow"></span>
                    <span class="edge"></span>
                    <span class="front text" id="rngDog">Random dog</span>
                    </button>
                </div>
                <div>
                    <button class="button" onclick="fetchCatData()">
                    <span class="shadow"></span>
                    <span class="edge"></span>
                    <span class="front text" id="rngCat">Random Cat</span>
                    </button> 
                    <br>
                </div>
                <div>
                    <button class="button" id="lever" onclick="autoScroll()">
                    <span class="shadow"></span>
                    <span class="edge"></span>
                    <span style="color: lightgray; background: hsl(187, 100%, 39%);" class="front text" id="autoScrollText">Auto Scroll: off</span>
                    </button> 
                    <br>
                </div>
            </div>
            <div>
                <img src="https://placehold.net/600x600.png" alt="Animal Pic" id="cutePic" class="pic"><br>
            </div>
        </div>
        <div class="main">
            <div class="bottombox">
                <div>
                    <div class="facttextbox">
                        <p id="cdfact">Fact</p>
                    </div>
                    <div class="factbox">
                        <div class="facttextcontainer">
                            <p style="text-align: center;" id="Fact"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
        <script src="main.js"></script>
</body>
</html>
